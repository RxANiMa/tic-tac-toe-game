<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
      color: #222;
    }

    .container {
      width: min(92vw, 420px);
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }

    .status {
      margin: 16px 0;
      font-size: 20px;
      font-weight: bold;
      min-height: 28px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px 0;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 14px;
      background: #e9e9e9;
      font-size: 52px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
    }

    .cell:hover {
      background: #dcdcdc;
      transform: scale(1.02);
    }

    .cell:disabled {
      cursor: not-allowed;
      color: #222;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 18px 0;
    }

    .score-card {
      background: #f1f1f1;
      padding: 12px;
      border-radius: 14px;
    }

    .score-card .label {
      font-size: 14px;
      color: #666;
    }

    .score-card .score {
      font-size: 28px;
      font-weight: bold;
      margin-top: 4px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button.action {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #222;
      color: white;
    }

    button.secondary {
      background: #777;
    }

    footer {
      margin-top: 14px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Tic Tac Toe</h1>

    <div class="status" id="status">ตาเดินของ X</div>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <section class="scoreboard">
      <div class="score-card">
        <div class="label">X ชนะ</div>
        <div class="score" id="scoreX">0</div>
      </div>
      <div class="score-card">
        <div class="label">O ชนะ</div>
        <div class="score" id="scoreO">0</div>
      </div>
      <div class="score-card">
        <div class="label">เสมอ</div>
        <div class="score" id="scoreDraw">0</div>
      </div>
    </section>

    <div class="buttons">
      <button class="action" onclick="newRound()">เริ่มรอบใหม่</button>
      <button class="action secondary" onclick="resetScore()">ล้างคะแนน</button>
    </div>

    <footer>เล่นได้เรื่อย ๆ คะแนนจะนับต่อจนกว่าจะกดล้างคะแนน</footer>
  </main>

  <script>
    const cells = document.querySelectorAll(".cell");
    const statusText = document.getElementById("status");

    const scoreX = document.getElementById("scoreX");
    const scoreO = document.getElementById("scoreO");
    const scoreDraw = document.getElementById("scoreDraw");

    let board = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let gameActive = true;

    let scores = {
      X: 0,
      O: 0,
      Draw: 0
    };

    const winningPatterns = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    cells.forEach(cell => {
      cell.addEventListener("click", handleCellClick);
    });

    function handleCellClick(event) {
      const index = event.target.dataset.index;

      if (board[index] !== "" || !gameActive) {
        return;
      }

      board[index] = currentPlayer;
      event.target.textContent = currentPlayer;

      checkResult();
    }

    function checkResult() {
      let winner = null;

      for (const pattern of winningPatterns) {
        const [a, b, c] = pattern;

        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          winner = board[a];
          break;
        }
      }

      if (winner) {
        statusText.textContent = `${winner} ชนะรอบนี้!`;
        scores[winner]++;
        updateScore();
        endGame();
        return;
      }

      if (!board.includes("")) {
        statusText.textContent = "เสมอกัน!";
        scores.Draw++;
        updateScore();
        endGame();
        return;
      }

      currentPlayer = currentPlayer === "X" ? "O" : "X";
      statusText.textContent = `ตาเดินของ ${currentPlayer}`;
    }

    function endGame() {
      gameActive = false;
      cells.forEach(cell => cell.disabled = true);
    }

    function newRound() {
      board = ["", "", "", "", "", "", "", "", ""];
      currentPlayer = "X";
      gameActive = true;
      statusText.textContent = "ตาเดินของ X";

      cells.forEach(cell => {
        cell.textContent = "";
        cell.disabled = false;
      });
    }

    function resetScore() {
      scores = {
        X: 0,
        O: 0,
        Draw: 0
      };

      updateScore();
      newRound();
    }

    function updateScore() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreDraw.textContent = scores.Draw;
    }
  </script>
</body>
</html>
