<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
      background: #f4f4f4; color: #222;
    }
    .container {
      width: min(94vw, 460px); background: white; padding: 24px; border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12); text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 30px; }
    .small { color: #666; font-size: 14px; line-height: 1.5; }
    .room-box { margin: 14px 0; padding: 12px; border-radius: 14px; background: #f1f1f1; word-break: break-word; }
    .status { margin: 16px 0; font-size: 20px; font-weight: bold; min-height: 28px; }
    .role { display: inline-block; margin-top: 8px; padding: 8px 12px; background: #222; color: white; border-radius: 999px; font-size: 14px; }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    .cell { aspect-ratio: 1 / 1; border: none; border-radius: 14px; background: #e9e9e9; font-size: 52px; font-weight: bold; cursor: pointer; transition: 0.15s; }
    .cell:hover { background: #dcdcdc; transform: scale(1.02); }
    .cell:disabled { cursor: not-allowed; color: #222; }
    .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 18px 0; }
    .score-card { background: #f1f1f1; padding: 12px; border-radius: 14px; }
    .label { font-size: 14px; color: #666; }
    .score { font-size: 28px; font-weight: bold; margin-top: 4px; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    button.action { border: none; border-radius: 12px; padding: 12px; font-size: 15px; cursor: pointer; background: #222; color: white; }
    button.secondary { background: #777; }
    button.wide { grid-column: 1 / -1; }
    .error {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #fff0f0;
      color: #a00000;
      font-size: 13px;
      text-align: left;
      white-space: pre-wrap;
    }
    footer { margin-top: 14px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <main class="container">
    <h1>Realtime Tic Tac Toe</h1>
    <div class="small">คนแรกที่เข้าห้องเป็น Observer คนที่สองเป็น X คนที่สามเป็น O</div>
    <div class="small">หลังจากนั้นผู้ที่เข้ามาเพิ่มจะเป็น Observer และดูเกมได้เท่านั้น</div>

    <div class="room-box">
      <div><strong>Room:</strong> <span id="roomIdText">Loading...</span></div>
      <div class="role" id="roleText">กำลังเชื่อมต่อ...</div>
    </div>

    <div class="status" id="status">กำลังโหลดเกม...</div>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <section class="scoreboard">
      <div class="score-card"><div class="label">X ชนะ</div><div class="score" id="scoreX">0</div></div>
      <div class="score-card"><div class="label">O ชนะ</div><div class="score" id="scoreO">0</div></div>
      <div class="score-card"><div class="label">เสมอ</div><div class="score" id="scoreDraw">0</div></div>
    </section>

    <div class="buttons">
      <button class="action" id="newRoundButton">เริ่มรอบใหม่</button>
      <button class="action secondary" id="resetScoreButton">ล้างคะแนน</button>
      <button class="action wide" id="copyLinkButton">คัดลอกลิงก์ห้องนี้</button>
      <button class="action secondary wide" id="newRoomButton">สร้างห้องใหม่</button>
    </div>

    <div class="error" id="errorBox"></div>

    <footer>ต้องตั้งค่า Firebase ก่อนใช้งานจริง</footer>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    /*
      Copy firebaseConfig จาก Firebase Console มาแทน block นี้
    */
  const firebaseConfig = {
    apiKey: "AIzaSyCbSZ-sUDyVBpGuBqmczjZMpQzYUty-Ck4",
    authDomain: "tic-tac-toe-pacrim.firebaseapp.com",
        databaseURL: "https://tic-tac-toe-pacrim-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "tic-tac-toe-pacrim",
    storageBucket: "tic-tac-toe-pacrim.firebasestorage.app",
    messagingSenderId: "190070254873",
    appId: "1:190070254873:web:c93cb85e45d7dccb2ea988",
    measurementId: "G-4DQYHH83P0"
  };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const cells = document.querySelectorAll(".cell");
    const statusText = document.getElementById("status");
    const roleText = document.getElementById("roleText");
    const roomIdText = document.getElementById("roomIdText");
    const scoreX = document.getElementById("scoreX");
    const scoreO = document.getElementById("scoreO");
    const scoreDraw = document.getElementById("scoreDraw");
    const newRoundButton = document.getElementById("newRoundButton");
    const resetScoreButton = document.getElementById("resetScoreButton");
    const copyLinkButton = document.getElementById("copyLinkButton");
    const newRoomButton = document.getElementById("newRoomButton");
    const errorBox = document.getElementById("errorBox");

    const winningPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let uid = null;
    let myRole = "observer";
    let currentRoom = null;
    let roomRef = null;

    function showError(error, message) {
      console.error(error);
      errorBox.style.display = "block";
      errorBox.textContent = message + "\n" + (error && error.code ? error.code : "") + " " + (error && error.message ? error.message : "");
    }

    function getRoomIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      let room = params.get("room");

      if (!room) {
        room = Math.random().toString(36).substring(2, 8);
        const newUrl = `${window.location.origin}${window.location.pathname}?room=${room}`;
        window.history.replaceState({}, "", newUrl);
      }

      return room;
    }

    function emptyBoard() {
      return ["", "", "", "", "", "", "", "", ""];
    }

    function createNewGame(firstObserverUid) {
      return {
        board: emptyBoard(),
        currentPlayer: "X",
        players: {},
        observers: { first: firstObserverUid },
        scores: { X: 0, O: 0, Draw: 0 },
        status: "waiting",
        winner: ""
      };
    }

    function normalizeGame(game) {
      if (!game.players) game.players = {};
      if (!game.observers) game.observers = {};
      if (!game.board) game.board = emptyBoard();
      if (!game.scores) game.scores = { X: 0, O: 0, Draw: 0 };
      if (!game.currentPlayer) game.currentPlayer = "X";
      if (!game.status) game.status = game.players.X && game.players.O ? "playing" : "waiting";
      if (!game.winner) game.winner = "";
      return game;
    }

    function isAlreadyObserver(game, userId) {
      if (!game.observers) return false;

      for (const key in game.observers) {
        if (game.observers[key] === userId) {
          return true;
        }
      }

      return false;
    }

    function addObserver(game, userId) {
      if (!game.observers) game.observers = {};
      if (isAlreadyObserver(game, userId)) return;

      const observerId = "observer_" + userId;
      game.observers[observerId] = userId;
    }

    function findWinner(board) {
      for (const pattern of winningPatterns) {
        const [a, b, c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a];
        }
      }
      return "";
    }

    function isDraw(board) {
      return board.every(cell => cell !== "");
    }

    async function joinRoom() {
      currentRoom = getRoomIdFromUrl();
      roomIdText.textContent = currentRoom;
      roomRef = ref(db, `games/${currentRoom}`);

      await runTransaction(roomRef, game => {
        if (game === null) {
          return createNewGame(uid);
        }

        game = normalizeGame(game);

        if (game.players.X === uid || game.players.O === uid || isAlreadyObserver(game, uid)) {
          return game;
        }

        // คนแรกของห้องเป็น Observer
        if (!game.observers.first) {
          game.observers.first = uid;
          return game;
        }

        // คนที่สองเป็น X
        if (!game.players.X) {
          game.players.X = uid;
          game.status = game.players.O ? "playing" : "waiting";
          return game;
        }

        // คนที่สามเป็น O
        if (!game.players.O) {
          game.players.O = uid;
          game.status = "playing";
          return game;
        }

        // คนหลังจากนั้นเป็น Observer
        addObserver(game, uid);
        return game;
      }).catch(error => {
        showError(error, "เข้าห้องเกมไม่สำเร็จ");
      });

      onValue(roomRef, snapshot => {
        renderGame(snapshot.val());
      }, error => {
        showError(error, "อ่านข้อมูลห้องเกมไม่สำเร็จ");
      });
    }

    function updateMyRole(game) {
      if (!game || !game.players) {
        myRole = "observer";
      } else if (game.players.X === uid) {
        myRole = "X";
      } else if (game.players.O === uid) {
        myRole = "O";
      } else {
        myRole = "observer";
      }

      roleText.textContent = myRole === "observer" ? "คุณเป็น Observer" : `คุณเป็นผู้เล่น ${myRole}`;
    }

    function renderGame(game) {
      if (!game) return;

      game = normalizeGame(game);
      updateMyRole(game);

      const board = game.board || emptyBoard();

      cells.forEach((cell, index) => {
        cell.textContent = board[index] || "";

        const isPlayer = myRole === "X" || myRole === "O";
        const canMove =
          isPlayer &&
          game.status === "playing" &&
          game.currentPlayer === myRole &&
          !board[index];

        cell.disabled = !canMove;
      });

      scoreX.textContent = game.scores?.X || 0;
      scoreO.textContent = game.scores?.O || 0;
      scoreDraw.textContent = game.scores?.Draw || 0;

      if (game.status === "waiting") {
        if (!game.players.X) {
          statusText.textContent = "รอผู้เล่น X เข้าห้อง";
        } else if (!game.players.O) {
          statusText.textContent = "รอผู้เล่น O เข้าห้อง";
        } else {
          statusText.textContent = "รอผู้เล่น";
        }
      } else if (game.status === "finished") {
        statusText.textContent = game.winner === "Draw" ? "เสมอกัน!" : `${game.winner} ชนะรอบนี้!`;
      } else {
        statusText.textContent = `ตาเดินของ ${game.currentPlayer}`;
      }
    }

    async function makeMove(index) {
      if (!roomRef || myRole === "observer") return;

      await runTransaction(roomRef, game => {
        if (!game) return game;
        game = normalizeGame(game);

        if (game.status !== "playing") return game;
        if (game.currentPlayer !== myRole) return game;
        if (!game.players || game.players[myRole] !== uid) return game;

        const board = game.board || emptyBoard();
        if (board[index]) return game;

        board[index] = myRole;
        game.board = board;

        const winner = findWinner(board);

        if (winner) {
          game.status = "finished";
          game.winner = winner;
          game.scores = game.scores || { X: 0, O: 0, Draw: 0 };
          game.scores[winner] = (game.scores[winner] || 0) + 1;
          return game;
        }

        if (isDraw(board)) {
          game.status = "finished";
          game.winner = "Draw";
          game.scores = game.scores || { X: 0, O: 0, Draw: 0 };
          game.scores.Draw = (game.scores.Draw || 0) + 1;
          return game;
        }

        game.currentPlayer = myRole === "X" ? "O" : "X";
        return game;
      });
    }

    async function newRound() {
      if (!roomRef || myRole === "observer") return;

      await runTransaction(roomRef, game => {
        if (!game) return game;

        game = normalizeGame(game);
        game.board = emptyBoard();
        game.currentPlayer = "X";
        game.winner = "";
        game.status = game.players?.X && game.players?.O ? "playing" : "waiting";

        return game;
      });
    }

    async function resetScore() {
      if (!roomRef || myRole === "observer") return;

      await runTransaction(roomRef, game => {
        if (!game) return game;

        game = normalizeGame(game);
        game.scores = { X: 0, O: 0, Draw: 0 };
        game.board = emptyBoard();
        game.currentPlayer = "X";
        game.winner = "";
        game.status = game.players?.X && game.players?.O ? "playing" : "waiting";

        return game;
      });
    }

    cells.forEach(cell => {
      cell.addEventListener("click", () => makeMove(Number(cell.dataset.index)));
    });

    newRoundButton.addEventListener("click", newRound);
    resetScoreButton.addEventListener("click", resetScore);

    copyLinkButton.addEventListener("click", async () => {
      await navigator.clipboard.writeText(window.location.href);
      copyLinkButton.textContent = "คัดลอกแล้ว";
      setTimeout(() => copyLinkButton.textContent = "คัดลอกลิงก์ห้องนี้", 1400);
    });

    newRoomButton.addEventListener("click", () => {
      const room = Math.random().toString(36).substring(2, 8);
      window.location.href = `${window.location.origin}${window.location.pathname}?room=${room}`;
    });

    signInAnonymously(auth).catch(error => {
      showError(error, "เชื่อมต่อ Firebase Auth ไม่สำเร็จ");
      statusText.textContent = "เชื่อมต่อ Firebase Auth ไม่สำเร็จ";
    });

    onAuthStateChanged(auth, user => {
      if (user && !uid) {
        uid = user.uid;
        joinRoom().catch(error => {
          showError(error, "เชื่อมต่อห้องเกมไม่สำเร็จ");
          statusText.textContent = "เชื่อมต่อห้องเกมไม่สำเร็จ";
        });
      }
    });
  </script>
</body>
</html>
